services:
  bot:
    build: .
    container_name: polyedge-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./bot.log:/app/bot.log
    depends_on:
      - db
    networks:
      - polyedge

  db:
    image: postgres:16-alpine
    container_name: polyedge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - polyedge

volumes:
  pgdata:

networks:
  polyedge:
    driver: bridge
